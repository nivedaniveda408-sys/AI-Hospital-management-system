version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/hospital_db?authSource=admin
      JWT_SECRET: your_secret_key
      NODE_ENV: production
    depends_on:
      - mongodb
    volumes:
      - .:/app

volumes:
  mongodb_data: